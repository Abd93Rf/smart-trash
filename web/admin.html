<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Trash - Administration</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>

    <!-- Barre de navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="dashboard.html"><i class="bi bi-recycle"></i> Smart Trash</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="dashboard.html"><i class="bi bi-speedometer2"></i> Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="statistiques.html"><i class="bi bi-bar-chart"></i> Statistiques</a></li>
                    <li class="nav-item"><a class="nav-link" href="itineraire.html"><i class="bi bi-map"></i> Itinéraire</a></li>
                    <li class="nav-item"><a class="nav-link" href="alertes.html"><i class="bi bi-exclamation-triangle"></i> Alertes</a></li>
                    <li class="nav-item"><a class="nav-link active" href="admin.html"><i class="bi bi-gear"></i> Admin</a></li>
                </ul>
                <span class="navbar-text text-light me-3" id="userInfo"></span>
                <button class="btn btn-outline-light btn-sm" onclick="deconnexion()"><i class="bi bi-box-arrow-right"></i> Déconnexion</button>
            </div>
        </div>
    </nav>

    <div class="main-content">
        <h1 class="page-title"><i class="bi bi-gear"></i> Administration des poubelles</h1>

        <!-- Bouton ajouter -->
        <button class="btn btn-success mb-4" data-bs-toggle="modal" data-bs-target="#modalPoubelle" onclick="ouvrirAjout()">
            <i class="bi bi-plus-circle"></i> Ajouter une poubelle
        </button>

        <!-- Tableau des poubelles -->
        <div class="card">
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-smart table-hover">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Nom</th>
                                <th>Adresse</th>
                                <th>Latitude</th>
                                <th>Longitude</th>
                                <th>Statut</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="tableAdmin">
                            <tr><td colspan="7" class="loading"><i class="bi bi-arrow-repeat"></i> Chargement...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal pour Ajouter / Modifier une poubelle -->
    <div class="modal fade" id="modalPoubelle" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="titreModal">Ajouter une poubelle</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <!-- Champ caché pour l'ID (en mode modification) -->
                    <input type="hidden" id="poubelleId">

                    <div class="mb-3">
                        <label class="form-label">Nom</label>
                        <input type="text" id="poubelleNom" class="form-control" placeholder="Ex: Poubelle F">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Adresse</label>
                        <input type="text" id="poubelleAdresse" class="form-control" placeholder="Ex: Avenue de la Liberté">
                    </div>
                    <div class="row">
                        <div class="col-6 mb-3">
                            <label class="form-label">Latitude</label>
                            <input type="number" id="poubelleLatitude" class="form-control" step="0.000001" placeholder="36.8065">
                        </div>
                        <div class="col-6 mb-3">
                            <label class="form-label">Longitude</label>
                            <input type="number" id="poubelleLongitude" class="form-control" step="0.000001" placeholder="10.1815">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Statut</label>
                        <select id="poubelleStatut" class="form-select">
                            <option value="actif">Actif</option>
                            <option value="maintenance">Maintenance</option>
                            <option value="inactif">Inactif</option>
                        </select>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Annuler</button>
                    <button type="button" class="btn btn-success" onclick="sauvegarderPoubelle()">
                        <i class="bi bi-check-lg"></i> Sauvegarder
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/admin.js"></script>

</body>
</html>
