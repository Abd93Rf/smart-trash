<head>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="css/style.css" rel="stylesheet">
</head>
<body>

    <!-- Barre de navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="dashboard.html"><i class="bi bi-recycle"></i> Smart Trash</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="dashboard.html"><i class="bi bi-speedometer2"></i> Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="statistiques.html"><i class="bi bi-bar-chart"></i> Statistiques</a></li>
                    <li class="nav-item"><a class="nav-link" href="itineraire.html"><i class="bi bi-map"></i> Itinéraire</a></li>
                    <li class="nav-item"><a class="nav-link active" href="alertes.html"><i class="bi bi-exclamation-triangle"></i> Alertes</a></li>
                    <li class="nav-item"><a class="nav-link" href="admin.html"><i class="bi bi-gear"></i> Admin</a></li>
                </ul>
                <span class="navbar-text text-light me-3" id="userInfo"></span>
                <button class="btn btn-outline-light btn-sm" onclick="deconnexion()"><i class="bi bi-box-arrow-right"></i> Déconnexion</button>
            </div>
        </div>
    </nav>

    <div class="main-content">
        <h1 class="page-title"><i class="bi bi-exclamation-triangle"></i> Alertes</h1>

        <!-- Filtres -->
        <div class="mb-4">
            <div class="btn-group">
                <button class="btn btn-danger active" onclick="filtrerAlertes('active', this)">Actives</button>
                <button class="btn btn-outline-success" onclick="filtrerAlertes('resolue', this)">Résolues</button>
                <button class="btn btn-outline-secondary" onclick="filtrerAlertes('', this)">Toutes</button>
            </div>
        </div>

        <!-- Liste des alertes -->
        <div id="listeAlertes">
            <p class="loading"><i class="bi bi-arrow-repeat"></i> Chargement...</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/alertes.js"></script>

</body>
