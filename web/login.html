<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Trash - Connexion</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <!-- CSS personnalisé -->
    <link href="css/style.css" rel="stylesheet">
</head>
<body>

    <div class="form-login">
        <h2><i class="bi bi-recycle"></i> Smart Trash</h2>
        <p class="text-center text-muted mb-4">Connectez-vous pour accéder au système</p>

        <!-- Message d'erreur (caché par défaut) -->
        <div id="erreur" class="alert alert-danger d-none"></div>

        <!-- Formulaire de connexion -->
        <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" id="email" class="form-control" placeholder="admin@smarttrash.fr">
        </div>

        <div class="mb-3">
            <label class="form-label">Mot de passe</label>
            <input type="password" id="mot_de_passe" class="form-control" placeholder="Mot de passe">
        </div>

        <button id="btnConnexion" class="btn btn-success w-100" onclick="connexion()">
            <i class="bi bi-box-arrow-in-right"></i> Se connecter
        </button>

        <p class="text-center text-muted mt-3" style="font-size: 0.8rem;">
            Compte test : admin@smarttrash.fr / admin123
        </p>
    </div>

    <script>
        // ============================================
        // Fonction de connexion
        // ============================================
        async function connexion() {
            // Récupérer les valeurs du formulaire
            var email = document.getElementById("email").value;
            var motDePasse = document.getElementById("mot_de_passe").value;
            var erreurDiv = document.getElementById("erreur");

            // Cacher le message d'erreur
            erreurDiv.classList.add("d-none");

            // Vérifier que les champs ne sont pas vides
            if (!email || !motDePasse) {
                erreurDiv.textContent = "Veuillez remplir tous les champs.";
                erreurDiv.classList.remove("d-none");
                return;
            }

            try {
                // Appeler l'API de connexion
                var response = await fetch("/api/login.php", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        email: email,
                        mot_de_passe: motDePasse
                    })
                });

                var resultat = await response.json();

                if (resultat.status === "success") {
                    // Sauvegarder les infos utilisateur
                    localStorage.setItem("user", JSON.stringify(resultat.data));
                    // Rediriger vers le dashboard
                    window.location.href = "dashboard.html";
                } else {
                    erreurDiv.textContent = resultat.message;
                    erreurDiv.classList.remove("d-none");
                }
            } catch (err) {
                erreurDiv.textContent = "Erreur de connexion au serveur.";
                erreurDiv.classList.remove("d-none");
            }
        }

        // Permettre de valider avec la touche Entrée
        document.getElementById("mot_de_passe").addEventListener("keypress", function(e) {
            if (e.key === "Enter") connexion();
        });
    </script>

</body>
</html>
