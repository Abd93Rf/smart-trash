<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Trash - Statistiques</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>

    <!-- Barre de navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="dashboard.html"><i class="bi bi-recycle"></i> Smart Trash</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="dashboard.html"><i class="bi bi-speedometer2"></i> Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link active" href="statistiques.html"><i class="bi bi-bar-chart"></i> Statistiques</a></li>
                    <li class="nav-item"><a class="nav-link" href="itineraire.html"><i class="bi bi-map"></i> Itinéraire</a></li>
                    <li class="nav-item"><a class="nav-link" href="alertes.html"><i class="bi bi-exclamation-triangle"></i> Alertes</a></li>
                    <li class="nav-item"><a class="nav-link" href="admin.html"><i class="bi bi-gear"></i> Admin</a></li>
                </ul>
                <span class="navbar-text text-light me-3" id="userInfo"></span>
                <button class="btn btn-outline-light btn-sm" onclick="deconnexion()"><i class="bi bi-box-arrow-right"></i> Déconnexion</button>
            </div>
        </div>
    </nav>

    <div class="main-content">
        <h1 class="page-title"><i class="bi bi-bar-chart"></i> Statistiques</h1>

        <div class="row mb-4">
            <!-- Graphique : Moyennes par jour -->
            <div class="col-lg-6 mb-4">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">Niveau moyen par jour (7 derniers jours)</h5>
                        <canvas id="graphMoyennes"></canvas>
                    </div>
                </div>
            </div>

            <!-- Graphique : Heures de pointe -->
            <div class="col-lg-6 mb-4">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">Remplissage par heure de la journée</h5>
                        <canvas id="graphHeures"></canvas>
                    </div>
                </div>
            </div>
        </div>

        <!-- Classement des poubelles -->
        <div class="card">
            <div class="card-body">
                <h5 class="card-title">Classement des poubelles les plus utilisées</h5>
                <div class="table-responsive">
                    <table class="table table-smart table-hover">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>Nom</th>
                                <th>Niveau moyen</th>
                                <th>Niveau max</th>
                                <th>Alertes</th>
                            </tr>
                        </thead>
                        <tbody id="tableClassement">
                            <tr><td colspan="5" class="loading"><i class="bi bi-arrow-repeat"></i> Chargement...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/statistiques.js"></script>

</body>
</html>
