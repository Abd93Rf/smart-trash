version: '3.8' # Version du format Docker Compose
services:

  # ============================================
  # Serveur Web Apache + PHP
  # ============================================
  web:
    image: php:8.2-apache
    container_name: smart_trash_web
    restart: always
    ports:
      - "8080:80"
    volumes:
      - ./api:/var/www/html/api
      - ./web:/var/www/html/web
    depends_on:
      - db
    # Variables d'environnement pour le mot de passe admin
    # Modifiable ici sans toucher au code PHP
    environment:
      ADMIN_PASSWORD: admin123
    # Installation PDO MySQL + init mot de passe + démarrage Apache
    command: >
      bash -c "docker-php-ext-install pdo pdo_mysql && php /var/www/html/api/init_password.php && apache2-foreground"

  # ============================================
  # Base de données MariaDB
  # ============================================
  db:
    image: mariadb:10.6
    container_name: smart_trash_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: smart_trash
      # Plus de MYSQL_ROOT_HOST: '%' — la sécurité est gérée
      # par le script init_user.sql qui crée un utilisateur dédié
    ports:
      - "3306:3306"
    volumes:
      # 1. Création des tables + données de test
      - ./database/schema.sql:/docker-entrypoint-initdb.d/1_schema.sql
      # 2. Création de l'utilisateur dédié (sécurité)
      - ./database/init_user.sql:/docker-entrypoint-initdb.d/2_init_user.sql
      # 3. Persistance des données
      - ./db_data:/var/lib/mysql

networks:
  default:
    name: smart_trash_network
